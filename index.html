<!doctype html>

  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uni4edu</title>
    <link rel="stylesheet" href="output.css" />
    </head>
    <body>
        <header class="bg-header m-5 flex justify-between items-center">
            <img src="images/favicon (1).ico" alt="logo" class=" w-12 h-auto">
            <!--nav bar section-->
            <div class="flex items-center gap-3">
                <img src="/images/033c161d-d742-407d-8390-db0edd0e0631.svg" alt="search" class="w-5 h-5">

                    <summary class="list-none flex items-center gap-1 text-sm font-semibold text-gray-800 cursor-pointer focus:outline-none [&::-webkit-details-marker]:hidden">

                        <span class="flex items-center gap-1.5 group-has-[:checked]:hidden">

                            <span>EN</span>
                        </span>
                        
                        <span class="hidden has-[:checked]:flex items-center gap-1.5">
                            <input type="radio" name="lang-group" id="lang-en" class="hidden" checked>
                            <svg class="w-5 h-3.5 rounded-sm object-cover shadow-sm" viewBox="0 0 6 3" src="/images/gb.svg"><path d="M0 0h6v3H0z" fill="#012169"/><path d="M0 0l6 3M6 0L0 3" stroke="#fff" stroke-width=".6"/><path d="M0 0l6 3M6 0L0 3" stroke="#C8102E" stroke-width=".4"/><path d="M3 0v3M0 1.5h6" stroke="#fff" stroke-width="1"/><path d="M3 0v3M0 1.5h6" stroke="#C8102E" stroke-width=".6"/></svg>
                            <span>EN</span>
                        </span>

                        <span class="hidden has-[:checked]:flex items-center gap-1.5">
                            <input type="radio" name="lang-group" id="lang-tr" class="hidden">
                            <svg class="w-5 h-3.5 rounded-sm object-cover shadow-sm" viewBox="0 0 1200 800" src="/images/tr.svg"><path d="M0 0h1200v800H0z" fill="#e30a17"/><circle cx="400" cy="400" r="200" fill="#fff"/><circle cx="450" cy="400" r="160" fill="#e30a17"/><path d="M575 400l-147-48 91-125v153l-91-125z" fill="#fff"/></svg>
                            <span>TR</span>
                        </span>

                        <span class="hidden has-[:checked]:flex items-center gap-1.5">
                            <input type="radio" name="lang-group" id="lang-es" class="hidden">

                        </span>

                        <span class="hidden has-[:checked]:flex items-center gap-1.5">
                            <input type="radio" name="lang-group" id="lang-ar" class="hidden">
                            <svg class="w-5 h-3.5 rounded-sm object-cover shadow-sm" viewBox="0 0 3 2" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h3v2H0z" fill="#006C35"/><path d="M2 1l-1 .5V1z" fill="#fff"/></svg>
                            <span>AR</span>
                        </span>

                        <span class="hidden has-[:checked]:flex items-center gap-1.5">

                            <span>JA</span>
                        </span>

                        <span class="hidden has-[:checked]:flex items-center gap-1.5">
                            <input type="radio" name="lang-group" id="lang-ko" class="hidden">

                            <span>MS</span>
                        </span>
                                                
                        

                        <svg class="w-4 h-4 text-gray-600 transition-transform duration-200 group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                        </svg>
                    </summary>

                    <div class="absolute right-0 mt-2 w-28 bg-white rounded-md shadow-xl ring-1 ring-black/5 py-1 z-50 animate-fadeIn">
                        
                        <label for="lang-en" class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 active:bg-gray-100 cursor-pointer">
                        <svg class="w-5 h-3.5 rounded-sm object-cover shadow-sm" viewBox="0 0 6 3" src="/images/gb.svg"><path d="M0 0h6v3H0z" fill="#012169"/><path d="M0 0l6 3M6 0L0 3" stroke="#fff" stroke-width=".6"/><path d="M0 0l6 3M6 0L0 3" stroke="#C8102E" stroke-width=".4"/><path d="M3 0v3M0 1.5h6" stroke="#fff" stroke-width="1"/><path d="M3 0v3M0 1.5h6" stroke="#C8102E" stroke-width=".6"/></svg>

                        <span>ES</span>
                        </label>

                        <label for="lang-ar" class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 active:bg-gray-100 cursor-pointer">
                            <svg class="w-5 h-3.5 rounded-sm object-cover shadow-sm" viewBox="0 0 3 2" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h3v2H0z" fill="#006C35"/><path d="M2 1l-1 .5V1z" fill="#fff"/></svg>

                            <label for="lang-hi" class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 active:bg-gray-100 cursor-pointer">
                            <svg class="w-5 h-3.5 rounded-sm object-cover shadow-sm" viewBox="0 0 3 2" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h3v.67H0z" fill="#FF9933"/><path d="M0 .67h3v.66H0z" fill="#fff"/><path d="M0 1.33h3V2H0z" fill="#128807"/><circle cx="1.5" cy="1" r=".2" fill="#000080"/></svg>
                            <span>HI</span>
                            </label>

                            <label for="lang-ja" class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 active:bg-gray-100 cursor-pointer">
                            <svg class="w-5 h-3.5 rounded-sm object-cover shadow-sm border border-gray-100" viewBox="0 0 3 2" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h3v2H0z" fill="#fff"/><circle cx="1.5" cy="1" r=".6" fill="#bc002d"/></svg>
                            <span>JA</span>
                            </label>

                            <label for="lang-ko" class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 active:bg-gray-100 cursor-pointer">
                            <svg class="w-5 h-3.5 rounded-sm object-cover shadow-sm border border-gray-100" viewBox="0 0 3 2" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h3v2H0z" fill="#fff"/><circle cx="1.5" cy="1" r=".4" fill="#cd2e3a"/></svg>
                            <span>KO</span>

                            <label for="lang-ms" class="flex items-center gap-2.5 px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 active:bg-gray-100 cursor-pointer">
                            <svg class="w-5 h-3.5 rounded-sm object-cover shadow-sm" viewBox="0 0 2 1" xmlns="http://www.w3.org/2000/svg"><path d="M0 0h2v1H0z" fill="#fff"/><path d="M0 0h2v.07H0zm0 .14h2v.07H0zm0 .14h2v.08H0zm0 .15h2v.07H0zm0 .14h2v.07H0zm0 .14h2v.07H0z" fill="#cc0000"/><path d="M0 0h1v.5H0z" fill="#000066"/></svg>

                <img src="/images/burger_menu.svg" class="w-7">
